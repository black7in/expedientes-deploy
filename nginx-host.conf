# ─────────────────────────────────────────────────────────────────────────────
#  Agregar este bloque al nginx del HOST (no al de Docker)
#  Ubicación típica: /etc/nginx/sites-available/expedientes
#
#  Luego:
#    sudo ln -s /etc/nginx/sites-available/expedientes /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # Cambia esto por tu dominio o IP
    server_name expedientes.tudominio.com;

    # Tamaño máximo para subir documentos PDF/DOCX
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
