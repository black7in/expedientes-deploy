# ─────────────────────────────────────────────────────────────────────────────
#  DESPLIEGUE EN SERVIDOR — Rosales y Asociados · Sistema de Expedientes
#
#  Requisitos en el servidor:
#    - Docker + Docker Compose instalados
#    - Repos clonados en ~/expedientes-app y ~/expedientes-ai
#    - Archivo .env con las variables de abajo
#
#  Primer despliegue:
#    bash update.sh --seed
#
#  Actualizar a nueva versión (solo git pull + reinicio):
#    bash update.sh
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Laravel (PHP-FPM) ───────────────────────────────────────────────────────
  app:
    build:
      context: ../expedientes-app
      dockerfile: docker/php/Dockerfile.prod
    container_name: expedientes_app
    restart: unless-stopped
    command: php-fpm
    volumes:
      # Docker copia los archivos de public/ de la imagen al volumen en el primer arranque
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-expedientes_juridicos}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai:8000
      FILESYSTEM_DISK: local
    networks:
      - juridico_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ../expedientes-app
      dockerfile: docker/nginx/Dockerfile
    container_name: expedientes_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app:ro
    networks:
      - juridico_net
    depends_on:
      - app

  # ─── FastAPI — Servicio IA ────────────────────────────────────────────────────
  ai:
    build:
      context: ../expedientes-ai
      dockerfile: Dockerfile
    container_name: expedientes_ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-laravel}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-expedientes_juridicos}
      STORAGE_PATH: /storage/documentos
    volumes:
      - storage_data:/storage:ro
    networks:
      - juridico_net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Queue Worker (procesa documentos subidos) ────────────────────────────────
  queue:
    build:
      context: ../expedientes-app
      dockerfile: docker/php/Dockerfile.prod
    container_name: expedientes_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage_data:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-expedientes_juridicos}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai:8000
    networks:
      - juridico_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai:
        condition: service_started

  # ─── PostgreSQL 16 + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: expedientes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-expedientes_juridicos}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - juridico_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-expedientes_juridicos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: expedientes_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - juridico_net

networks:
  juridico_net:
    driver: bridge

volumes:
  postgres_data:   # datos de la base de datos (persistente)
  redis_data:      # caché y colas (persistente)
  storage_data:    # archivos subidos — compartido entre app, queue, ai y nginx
  public_data:     # archivos públicos de Laravel (CSS, JS compilado) — compartido con nginx
